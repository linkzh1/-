<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>IoT Vulnerability Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 200px;
            background-color: #343a40;
            padding-top: 20px;
        }
        .sidebar h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            padding: 0;
        }
        .sidebar a {
            display: block;
            color: #adb5bd;
            text-decoration: none;
            padding: 15px 20px;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            color: white;
            background-color: #495057;
            border-left: 4px solid #0d6efd;
        }
        .content {
            margin-left: 200px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- 简化侧边栏：只保留 Device List -->
    <div class="sidebar">
        <h2>🛡️ IoT Scanner</h2>
        <ul>
            <li>
                <a href="{{ url_for('device.index') }}" class="{% if request.endpoint == 'device.index' %}active{% endif %}">
                    📱 Device List
                </a>
            </li>
            <!-- Overview 和 Settings 已删除 -->
        </ul>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
